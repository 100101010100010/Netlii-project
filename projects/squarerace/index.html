<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Race: Arcade Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; color: #fff; text-align: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .ui { padding: 12px; background: #111; border-bottom: 2px solid #FF3E3E; flex-shrink: 0; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; position: relative; }
        #leaderboard { position: absolute; top: 60px; right: 10px; background: rgba(0, 0, 0, 0.8); padding: 10px; border-radius: 8px; border: 1px solid #444; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .stat-item { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 0.9rem; }
        .mini-sq { width: 15px; height: 15px; border-radius: 2px; }
        canvas { background: #000; display: block; margin: auto; max-width: 100vw; max-height: calc(100vh - 50px); border: 1px solid #222; }
        #winner { color: #FFFB00; font-weight: 900; }
    </style>
</head>
<body>
    <div class="ui">LEVEL <span id="lvl">1</span> | <span id="winner">RACING...</span></div>
    <div id="leaderboard"></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const COLOR_CONFIG = [
            { hex: '#FF3E3E', name: 'RED' },
            { hex: '#FFFB00', name: 'YELLOW' },
            { hex: '#00FF66', name: 'GREEN' },
            { hex: '#0099FF', name: 'BLUE' }
        ];

        let wins = { 'RED': 0, 'YELLOW': 0, 'GREEN': 0, 'BLUE': 0 };
        const SQ_SIZE = 22;
        const BASE_SPEED = 4.5;
        const GRAVITY = 0.1;

        let currentLevel = 1;
        let squares = [];
        let platforms = [];
        let powerups = [];
        let gameOver = false;

        function resize() {
            canvas.width = Math.min(window.innerWidth, 450);
            canvas.height = window.innerHeight - 60;
        }
        window.addEventListener('resize', () => { resize(); init(currentLevel); });
        resize();

        function updateLeaderboard() {
            const container = document.getElementById('leaderboard');
            container.innerHTML = '';
            COLOR_CONFIG.forEach(conf => {
                const item = document.createElement('div');
                item.className = 'stat-item';
                item.innerHTML = `<div class="mini-sq" style="background: ${conf.hex}"></div><span>${wins[conf.name]}</span>`;
                container.appendChild(item);
            });
        }

        function generateLevel(lvl) {
            platforms = [];
            powerups = [];
            const rows = 5 + lvl;
            const spacing = (canvas.height - 150) / rows;
            for (let i = 0; i < rows; i++) {
                let y = 120 + (i * spacing);
                let gapWidth = 130;
                let gapX = Math.random() * (canvas.width - gapWidth);
                
                platforms.push({x: 0, y: y, w: gapX, h: 15});
                platforms.push({x: gapX + gapWidth, y: y, w: canvas.width - (gapX + gapWidth), h: 15});

                if (Math.random() > 0.4) {
                    const isFast = Math.random() > 0.5;
                    const pX = Math.random() > 0.5 ? gapX - 15 : gapX + gapWidth + 15;
                    powerups.push({ x: pX, y: y - 20, type: isFast ? 'fast' : 'slow', collected: false });
                }
            }
        }

        function init(lvl) {
            gameOver = false;
            document.getElementById('winner').innerText = "RACING...";
            document.getElementById('lvl').innerText = lvl;
            updateLeaderboard();
            generateLevel(lvl);
            squares = COLOR_CONFIG.map((conf, i) => ({
                x: (canvas.width / 5) * (i + 1),
                y: 40,
                vx: (Math.random() - 0.5) * BASE_SPEED,
                vy: BASE_SPEED,
                color: conf.hex,
                name: conf.name,
                speedMult: 1,
                powerTimer: 0
            }));
        }

        // --- NEW: Physics Collision Resolution ---
        function resolveSquareCollision(s1, s2) {
            const dx = (s2.x + SQ_SIZE/2) - (s1.x + SQ_SIZE/2);
            const dy = (s2.y + SQ_SIZE/2) - (s1.y + SQ_SIZE/2);
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < SQ_SIZE) {
                // Direction of impact
                const nx = dx / dist;
                const ny = dy / dist;

                // Relative velocity
                const rvx = s2.vx - s1.vx;
                const rvy = s2.vy - s1.vy;

                // Velocity along the normal
                const velAlongNormal = rvx * nx + rvy * ny;

                // Do not resolve if velocities are separating
                if (velAlongNormal > 0) return;

                // Bounce factor
                const j = -2 * velAlongNormal;
                const impulseX = (j / 2) * nx;
                const impulseY = (j / 2) * ny;

                s1.vx -= impulseX;
                s1.vy -= impulseY;
                s2.vx += impulseX;
                s2.vy += impulseY;

                // Prevent sticking
                const overlap = SQ_SIZE - dist + 1;
                s1.x -= (overlap / 2) * nx;
                s1.y -= (overlap / 2) * ny;
                s2.x += (overlap / 2) * nx;
                s2.y += (overlap / 2) * ny;
            }
        }

        function update() {
            if (gameOver) return;

            // Resolve collisions between all pairs of squares
            for (let i = 0; i < squares.length; i++) {
                for (let j = i + 1; j < squares.length; j++) {
                    resolveSquareCollision(squares[i], squares[j]);
                }
            }

            squares.forEach(s => {
                if (s.powerTimer > 0) {
                    s.powerTimer--;
                    if (s.powerTimer === 0) s.speedMult = 1;
                }

                s.vy += GRAVITY;
                
                const target = BASE_SPEED * s.speedMult;
                const currSpeed = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
                s.vx = (s.vx / currSpeed) * target;
                s.vy = (s.vy / currSpeed) * target;

                let nextX = s.x + s.vx;
                let nextY = s.y + s.vy;

                if (nextX <= 0 || nextX + SQ_SIZE >= canvas.width) s.vx *= -1;
                if (nextY <= 0) s.vy *= -1;

                platforms.forEach(p => {
                    if (nextX < p.x + p.w && nextX + SQ_SIZE > p.x && nextY < p.y + p.h && nextY + SQ_SIZE > p.y) {
                        if (s.y + SQ_SIZE <= p.y || s.y >= p.y + p.h) { s.vy *= -1; s.vx += (Math.random() - 0.5) * 2; }
                        else { s.vx *= -1; }
                    }
                });

                powerups.forEach(p => {
                    if (!p.collected && nextX < p.x + 15 && nextX + SQ_SIZE > p.x && nextY < p.y + 15 && nextY + SQ_SIZE > p.y) {
                        p.collected = true;
                        s.speedMult = p.type === 'fast' ? 1.8 : 0.5;
                        s.powerTimer = 180;
                    }
                });

                s.x += s.vx;
                s.y += s.vy;

                if (s.y + SQ_SIZE >= canvas.height) {
                    gameOver = true;
                    wins[s.name]++;
                    updateLeaderboard();
                    document.getElementById('winner').innerText = `${s.name} WINS! :)`;
                    setTimeout(() => { currentLevel++; init(currentLevel); }, 2000);
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#333';
            platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

            powerups.forEach(p => {
                if (p.collected) return;
                ctx.fillStyle = p.type === 'fast' ? '#FF0044' : '#00FFFF';
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            squares.forEach(s => {
                ctx.fillStyle = s.color;
                ctx.shadowBlur = s.speedMult > 1 ? 30 : 15;
                ctx.shadowColor = s.color;
                ctx.fillRect(s.x, s.y, SQ_SIZE, SQ_SIZE);
                ctx.shadowBlur = 0;

                // FACE
                ctx.fillStyle = "black";
                const eyeX = (s.vx / (BASE_SPEED * s.speedMult)) * 3;
                const eyeY = (s.vy / (BASE_SPEED * s.speedMult)) * 2;
                ctx.beginPath();
                ctx.arc(s.x + SQ_SIZE * 0.3 + eyeX, s.y + SQ_SIZE * 0.35 + eyeY, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s.x + SQ_SIZE * 0.7 + eyeX, s.y + SQ_SIZE * 0.35 + eyeY, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(s.x + SQ_SIZE * 0.5, s.y + SQ_SIZE * 0.6, 5, 0.1 * Math.PI, 0.9 * Math.PI);
                ctx.stroke();
            });

            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, canvas.height - 5, canvas.width, 5);
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        init(currentLevel);
        loop();
    </script>
</body>
</html>
