<!DOCTYPE html>

<head>
    <script type="module">
        import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
        window.BareMux = BareMux;
    </script>

    <script>
        async function registerAndConfig() {
        const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
    
        const wispUrl = localStorage.getItem("proxServer") || "wss://wisp.mercurywork.shop/";
        const config = {
        type: "config",
        wispurl: wispUrl,
        autoswitch: true
    };

    // Function to poke the worker until it wakes up
    const poke = () => {
        if (navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage(config);
        }
    };

    poke();
    setTimeout(poke, 500);  // Retry after half a second
    setTimeout(poke, 2000); // Retry again
}
        async function preInitProxy() {
            if ('serviceWorker' in navigator) {
                try {
                    // Register the worker
                    const reg = await navigator.serviceWorker.register('./sw.js', {
                        scope: './'
                    });
                    
                    // Warm up the connection to the WISP server
                    if (window.BareMux) {
                        const conn = new window.BareMux.BareMuxConnection("/bareworker.js");
                        const wispUrl = localStorage.getItem("proxServer") || "wss://wisp.mercurywork.shop";
                        
                        await conn.setTransport(
                            "https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs", 
                            [{ wisp: wispUrl }]
                        );
                        console.log("Proxy pre-initialized from <head>");
                    }
                } catch (err) {
                    console.error("Proxy pre-init failed:", err);
                }
            }
        }
        preInitProxy();
    </script>
    <script type="module">
    import * as BareMux from "https://cdn.jsdelivr.net/npm/@mercuryworkshop/bare-mux/dist/index.mjs";
    window.BareMux = BareMux;
</script>

<script>
    async function initProxy() {
        if ('serviceWorker' in navigator) {
            try {
                // Register the worker
                const reg = await navigator.serviceWorker.register('./sw.js', {
                    scope: './'
                });

                // FORCE the service worker to take control immediately
                if (reg.waiting) {
                    reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                }

                // Wait until the service worker is actually controlling the page
                await navigator.serviceWorker.ready;

                if (window.BareMux) {
                    const conn = new window.BareMux.BareMuxConnection("./bareworker.js");
                    
                    // Try a different WISP server if the first one is stuck
                    // Use 'wss://wisp.mercurywork.shop/' as it is usually the most stable
                    const wispUrl = localStorage.getItem("proxServer") || "wss://wisp.mercurywork.shop/";
                    
                    await conn.setTransport(
                        "https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs", 
                        [{ wisp: wispUrl }]
                    );
                    
                    // Send the config to the SW so it knows where to route traffic
                    const sw = navigator.serviceWorker.controller;
                    if (sw) {
                        sw.postMessage({
                            type: "config",
                            wispurl: wispUrl,
                            autoswitch: true
                        });
                    }
                    console.log("Proxy Ready!");
                }
            } catch (err) {
                console.error("Proxy Initialization Error:", err);
            }
        }
    }
    initProxy();
</script>

        html, body {

        /* Theme Toggle Styling */
        .theme-switch-wrapper {

            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(26px); }

            font-size: 0.8rem;
            font-weight: bold;

            letter-spacing: 1px;

   <script>
       // Updated Search Logic for Nexus-proxy
const homeSearch = document.getElementById('home-search');

function search(query) {
    const searchEngine = "https://www.google.com/search?q=";
    
    // Check if it's a URL
    if (query.includes('.') && !query.includes(' ')) {
        let url = query;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        // Redirect to the Nexus embed page with the URL
        window.location.href = `/Nexus-Proxy/embed.html#${url}`;
    } else {
        // Redirect to the Nexus embed page with a Google search
        window.location.href = `/Nexus-Proxy/embed.html#${searchEngine}${encodeURIComponent(query)}`;
    }
}

homeSearch.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        const query = homeSearch.value.trim();
        if (query) {
            search(query);
        }
    }
});
   </script>
   <script>
             // Theme Toggle Logic
        const toggleSwitch = document.querySelector('#theme-toggle');
        
        function switchTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }    
        }

        toggleSwitch.addEventListener('change', switchTheme, false);

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                toggleSwitch.checked = true;
            }
        }
   </script>
</body>
